<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contatos - LIMAPLAS</title>
    <link rel="stylesheet" href="bootstrap/assets/CSS/Contatoplas.css" />
  </head>
  <body>
    <!-- Imagem de topo -->
    <div class="header-image">
      <div class="logo">
        <img src="mídias/LIMAPLAS_TRANSP_Alta Resol.png" alt="Logo LimaPlas" />
      </div>
    </div>

    <!-- Menu -->
    <header>
      <nav>
        <ul>
          <li><a href="indexLimaPlas.html">Home</a></li>
          <li><a href="produtoLimaPlas.html">Produtos</a></li>
        </ul>
      </nav>
    </header>

    <!-- Seção de contatos -->
    <section id="contatos">
      <br />
      <h2>Entre em contato conosco para mais informações</h2>

      <div class="container">
        <!-- Cards -->
        <div class="cards">
          <div class="card">
            <h3>Carlos Henrique dos Santos Lima</h3>
            <p>Diretor</p>

            <a href="https://wa.me/5514998587225" target="_blank">
              <p>📞 (14) 99858-7225</p>
            </a>

            <p>
              ✉️
              <a href="mailto:henriquelima@limaplas.com.br">
                henriquelima@limaplas.com.br
              </a>
            </p>
          </div>

          <div class="card">
            <h3>Edvaldo de Lima</h3>
            <p>Diretor</p>

            <a href="https://wa.me/5514996941939" target="_blank">
              <p>📞 (14) 99694-1939</p>
            </a>

            <p>
              ✉️
              <a href="mailto:edvaldo@limapack.com.br">
                edvaldo@limapack.com.br
              </a>
            </p>
          </div>
        </div>

        <!-- Formulário -->
        <form action="https://formspree.io/f/SEU_ID" method="POST">
          <label for="nome">Nome:</label>
          <input type="text" id="nome" name="nome" required />

          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required />

          <label for="telefone">Telefone:</label>
          <input type="tel" id="telefone" name="telefone" required />

          <label for="duvida">Dúvida:</label>
          <textarea id="duvida" name="duvida" rows="5" required></textarea>

          <button type="submit">Enviar</button>
        </form>

        <!-- Redes sociais -->
        <div class="social-links">
          <a href="https://wa.me/5514998587225" target="_blank">
            <img src="mídias/logoWhats.png" alt="WhatsApp" />
          </a>
          <a href="https://facebook.com" target="_blank">
            <img src="mídias/logoFace.png" alt="Facebook" />
          </a>
          <a href="https://instagram.com" target="_blank">
            <img src="mídias/logoInsta.png" alt="Instagram" />
          </a>
        </div>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
